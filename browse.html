<!DOCTYPE html>
<html>
<head>

<title>Browse Devices</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
margin:0;
}

.header{
padding:20px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="header">
<h2>Browse Devices</h2>
</div>

<div class="grid">

<div class="card">
<h3>Samsung S24 Ultra</h3>
<p>₹75,000</p>
<p>Hyderabad</p>
</div>

<div class="card">
<h3>iPhone 15 Pro</h3>
<p>₹90,000</p>
<p>Delhi</p>
</div>

<div class="card">
<h3>MacBook Air M2</h3>
<p>₹85,000</p>
<p>Mumbai</p>
</div>

</div>

</body>
</html>
